<!-- Wall app logo: corkboard frame + sticky note -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none" role="img" aria-label="Wall logo">
  <rect width="48" height="48" rx="14" fill="#141414"/>
  <rect x="8" y="10" width="32" height="28" rx="4" fill="#8B6914"/>
  <rect x="8" y="10" width="32" height="28" rx="4" fill="url(#board)" opacity="0.85"/>
  <rect x="13" y="16" width="14" height="11" rx="2" fill="#FEF08A" transform="rotate(-6 20 21.5)"/>
  <rect x="24" y="22" width="12" height="9" rx="2" fill="#FDE68A" transform="rotate(4 30 26.5)"/>
  <circle cx="19" cy="15" r="2.5" fill="#DC2626"/>
  <circle cx="34" cy="20" r="2.5" fill="#2563EB"/>
  <defs>
    <linearGradient id="board" x1="8" y1="10" x2="40" y2="38" gradientUnits="userSpaceOnUse">
      <stop stop-color="#C4A574"/>
      <stop offset="1" stop-color="#6B4F2A"/>
    </linearGradient>
  </defs>
</svg>
