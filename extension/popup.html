<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Wall Live</title>
    <style>
      body { font: 13px system-ui; width: 260px; padding: 12px; background: #050508; color: #fafafa; }
      label { display: flex; align-items: center; gap: 8px; margin: 8px 0; }
      h1 { font-size: 14px; margin: 0 0 8px; color: #beee1d; }
      p { font-size: 11px; color: #737373; }
    </style>
  </head>
  <body>
    <h1>Wall Live</h1>
    <p>Live previews for wall.app links. No analytics — only fetches public PNG URLs.</p>
    <label><input type="checkbox" id="linkedin" /> linkedin.com</label>
    <label><input type="checkbox" id="twitter" /> twitter.com / x.com</label>
    <label><input type="checkbox" id="reddit" /> reddit.com</label>
    <script type="module" src="popup.js"></script>
  </body>
</html>
